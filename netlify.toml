[build]
  command = "pnpm --filter @workspace/faith-church run build"
  publish = "artifacts/faith-church/dist/public"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "24"
  PNPM_VERSION = "10"

# Proxy /api/youtube/videos → Netlify Function (keeps frontend unchanged)
[[redirects]]
  from = "/api/youtube/videos"
  to = "/.netlify/functions/youtube-videos"
  status = 200

# SPA catch-all — must be last
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
