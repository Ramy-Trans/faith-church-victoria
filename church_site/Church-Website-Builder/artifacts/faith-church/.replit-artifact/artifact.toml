kind = "web"
previewPath = "/"
title = "كنيسة الإيمان - Faith Church"
version = "1.0.0"
id = "artifacts/faith-church"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25472

[services.development]
run = "pnpm --filter @workspace/faith-church run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/faith-church", "run", "build" ]
publicDir = "artifacts/faith-church/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25472"
BASE_PATH = "/"
